<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fluxon</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo-title">
      <img src="icons/fluxon24.png" alt="Logo" class="logo">
      <h1>Fluxon</h1>
    </div>
    <div class="actions">
      <button id="download-all-btn" title="Download all captured files" style="background-color: #0078d7; color: white;">Download All</button>
      <button id="popout-btn" title="Open in dedicated window to keep open">Popout</button>
      <button id="clear-btn" title="Clear All">Clear</button>
      <button id="options-btn" title="Options">⚙️</button>
    </div>
  </div>
  
  <div class="list-container">
    <table id="media-list" class="hidden">
      <thead>
        <tr>
          <th>File</th>
          <th>Type</th>
          <th>Size</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="media-tbody">
        <!-- JS will populate rows -->
      </tbody>
    </table>
    <div id="empty-state" class="empty-state">
      <p>No media captured yet.</p>
    </div>
  </div>

  <div class="logs-section">
    <h4>Extension Logs <button id="clear-logs-btn" style="float: right; font-size: 10px; padding: 2px 4px;">Clear Logs</button></h4>
    <div id="logs-container" class="logs-container">
      <!-- Logs populate here -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
