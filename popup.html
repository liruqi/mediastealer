<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Fluxon</title>
  <link rel="stylesheet" href="popup.css">
  <script src="i18n-helper.js"></script>
</head>

<body>
  <div class="header">
    <div class="logo-title">
      <img src="icons/fluxon24.png" alt="Logo" class="logo">
      <h1 data-i18n="appName">Fluxon</h1>
    </div>
    <div class="actions">
      <button id="download-all-btn" data-i18n-title="tt_download_all" data-i18n="btn_download_all"
        style="background-color: #0078d7; color: white;">Download All</button>
      <button id="clear-btn" data-i18n-title="tt_clear_all" data-i18n="btn_clear_downloads">Clear</button>
      <button id="options-btn" data-i18n-title="tt_options">⚙️</button>
      <button id="popout-btn" data-i18n-title="tt_popout" title="Popout">⧉</button>
    </div>
  </div>

  <div class="list-container">
    <table id="media-list" class="hidden">
      <thead>
        <tr>
          <th data-i18n="th_filename">File</th>
          <th data-i18n="th_type">Type</th>
          <th data-i18n="th_size">Size</th>
          <th data-i18n="th_action">Action</th>
        </tr>
      </thead>
      <tbody id="media-tbody">
        <!-- JS will populate rows -->
      </tbody>
    </table>
    <div id="empty-state" class="empty-state">
      <p data-i18n="no_media">No media captured yet.</p>
    </div>
  </div>

  <div class="logs-section">
    <div class="logs-header">
      <h4 data-i18n="title_logs">Extension Logs</h4>
      <button id="clear-logs-btn" data-i18n="btn_clear_logs" style="font-size: 10px; padding: 2px 6px;">Clear
        Logs</button>
    </div>
    <div id="logs-container" class="logs-container">
      <!-- Logs populate here -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
